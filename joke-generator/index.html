<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-generator">
            <h1>😂 Joke Generator</h1>
            <p class="subtitle">Get a random laugh!</p>
            
            <div class="joke-display">
                <div id="jokeBox" class="joke-box">
                    <p class="loading">Click "Get Joke" to start laughing...</p>
                </div>
            </div>
            
            <div class="controls">
                <button id="getJokeBtn" class="btn-primary">Get Joke</button>
                <button id="shareBtn" class="btn-secondary" disabled>Share</button>
                <button id="copyBtn" class="btn-secondary" disabled>Copy</button>
            </div>
            
            <div class="joke-type-selector">
                <label for="jokeType">Joke Type:</label>
                <select id="jokeType" class="type-select">
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>
            
            <div class="favorites-section">
                <h2>Favorite Jokes ❤️</h2>
                <button id="clearFavBtn" class="btn-clear">Clear All</button>
                <ul id="favoritesList" class="favorites-list">
                    <!-- Favorites will be added here -->
                </ul>
            </div>
            
            <div class="stats">
                <p id="statsText">Jokes retrieved: 0 | Favorites: 0</p>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
